<!DOCTYPE html>
<html>
<head>
    <title>банк</title>
<style>
    .big-text { font-size: 28px; }
    .small-text { font-size: 12px; }
</style>
</head>
<p>Баланс: <span class="big-text" id="balanceDisplay">81976</span> дк</p>
<p>Кредиты:</p>
<p>1. 50000дк  Комисия 492дк</p>
<p style="margin-bottom: 20px;">Итого +49002дк</p>
<p> Осталось платежей 49976</p>

<script>
// Читаем параметр 'balance' из URL
const urlParams = new URLSearchParams(window.location.search);
const balanceParam = urlParams.get('balance');

// Если параметр есть — показываем его и сохраняем в localStorage
if (balanceParam) {
    localStorage.setItem('currentBalance', balanceParam);
    document.getElementById('balanceDisplay').textContent = balanceParam;
} else {
    // Если параметра нет — берём из localStorage (или показываем последний)
    const savedBalance = localStorage.getItem('currentBalance') || '81976';
    document.getElementById('balanceDisplay').textContent = savedBalance;
}
</script>
</body>
</html>
